<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clicker Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin-top: 50px;
    }

    h1 {
      color: #00ffcc;
    }

    .score {
      font-size: 2em;
      margin: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .click-btn {
      background: #00ffcc;
    }

    .click-btn:hover {
      background: #00ccaa;
    }

    .upgrade-btn {
      background: #ffcc00;
    }

    .upgrade-btn:hover {
      background: #e6b800;
    }
  </style>
</head>
<body>

  <h1>Clicker Game</h1>

  <div class="score">
    Points: <span id="score">0</span>
  </div>

  <button class="click-btn" onclick="addScore()">Click Me!</button>

  <div>
    <button class="upgrade-btn" onclick="buyUpgrade()">
      Upgrade Click (+1 per click) - Cost: <span id="upgradeCost">10</span>
    </button>
  </div>

  <div>
    <button class="upgrade-btn" onclick="buyAutoClicker()">
      Auto Clicker (+1/sec) - Cost: <span id="autoCost">50</span>
    </button>
  </div>

  <script>
    let score = 0;
    let perClick = 1;

    let upgradeCost = 10;
    let autoCost = 50;

    let autoClickers = 0;

    function updateDisplay() {
      document.getElementById("score").innerText = score;
      document.getElementById("upgradeCost").innerText = upgradeCost;
      document.getElementById("autoCost").innerText = autoCost;
    }

    function addScore() {
      score += perClick;
      updateDisplay();
    }

    function buyUpgrade() {
      if (score >= upgradeCost) {
        score -= upgradeCost;
        perClick += 1;
        upgradeCost = Math.floor(upgradeCost * 1.5);
        updateDisplay();
      } else {
        alert("Not enough points!");
      }
    }

    function buyAutoClicker() {
      if (score >= autoCost) {
        score -= autoCost;
        autoClickers += 1;
        autoCost = Math.floor(autoCost * 1.7);
        updateDisplay();
      } else {
        alert("Not enough points!");
      }
    }

    setInterval(() => {
      score += autoClickers;
      updateDisplay();
    }, 1000);

    updateDisplay();
  </script>

</body>
</html>
